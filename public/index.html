<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8" />

    <!-- 항상 최신 index.html 로드 (WebView가 no-cache 헤더 무시하는 경우 대비) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- PC(화면폭 1024px 이상)로 루트 접속 시 정적 랜딩으로, 모바일은 기존 앱(로그인) 유지 -->
    <script>
      (function () {
        try {
          var w = window.innerWidth || document.documentElement.clientWidth || 0;
          var atRoot = location.pathname === "/" || location.pathname === "/index.html";
          var forceApp = location.search.indexOf("app=1") !== -1;
          if (w >= 1024 && atRoot && !forceApp) {
            location.replace("/landing/");
          }
        } catch (e) {}
      })();
    </script>

    <title>hallemalle</title>

      <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />

      <!-- Pretendard @font-face (2단 서브셋). scripts/subset-fonts.py 로 생성한다. -->
      <link rel="stylesheet" href="/fonts/pretendard.css" />

      <!-- 로그인 임계 경로에서 쓰는 오리진들 — TLS 핸드셰이크를 미리 끝내둔다 -->
      <link rel="preconnect" href="https://asia-northeast3-halle-bf789.cloudfunctions.net" crossorigin />
      <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
      <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
      <link rel="dns-prefetch" href="https://kauth.kakao.com" />

      <!-- defer: HTML 파싱을 막지 않게 한다. defer 스크립트는 문서 순서대로,
           그리고 번들(main.js)보다 먼저 실행되므로 window.kakao / window.daum 보장은 그대로다. -->
      <script defer src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2d8b1df3e4634162cb9753b1a328dc21&libraries=services,clusterer&autoload=false"></script>
      <script defer src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

  </head>


  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

  </body>
</html>
