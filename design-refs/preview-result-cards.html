<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>경기 결과 카드 (입력 / 완료)</title>
<style>
  body{margin:0;background:#f9fafb;font-family:-apple-system,'Segoe UI',Roboto,'Malgun Gothic',sans-serif;padding:16px;}
  .frame{width:100%;max-width:412px;margin:0 auto;display:flex;flex-direction:column;gap:16px;}
  .cap{font-size:12px;color:#6b7280;font-weight:700;}
  .card{background:#fff;border-radius:16px;box-shadow:0 6px 16px rgba(15,23,42,.08);border:1px solid #eef0f3;padding:16px 14px;}
  .ttl{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:#111827;margin-bottom:12px;}
  .ttl .sub{font-size:12px;font-weight:500;color:#9ca3af;}

  .banner{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:8px;margin:2px 0 14px;padding:13px 16px;border-radius:14px;}
  .banner.win{background:linear-gradient(135deg,#34d399,#10b981);box-shadow:0 12px 22px -12px rgba(16,185,129,.6);}
  .banner.win .btxt{color:#fff;} .banner.win .b3d{width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(15,23,42,.25));}
  .btxt{font-size:19px;font-weight:900;letter-spacing:-.3px;}

  .row{display:flex;align-items:flex-end;gap:10px;margin-top:4px;}
  .col{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .lw{position:relative;flex-shrink:0;}
  .crown{position:absolute;top:-17px;left:50%;transform:translateX(-50%);width:26px;height:26px;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(15,23,42,.18));}
  .chip{width:52px;height:52px;border-radius:14px;overflow:hidden;background:#f3f4f6;display:grid;place-items:center;box-shadow:0 0 0 1px rgba(15,23,42,.05);}
  .chip img{width:100%;height:100%;object-fit:cover;}
  .name{font-size:14px;font-weight:700;color:#111827;}
  .csub{font-size:11px;color:#6b7280;} .csub.me{color:#4f46e5;}
  .input{width:100%;margin-top:2px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;color:#111827;padding:12px 8px;font-size:26px;font-weight:700;text-align:center;box-sizing:border-box;}
  .read{width:100%;margin-top:2px;border-radius:10px;border:1px solid #e5e7eb;background:#f9fafb;padding:12px 8px;font-size:26px;font-weight:700;text-align:center;box-sizing:border-box;}
  .read.win{color:#16a34a;} .read.lose{color:#dc2626;}
  .colon{padding-bottom:14px;font-size:20px;color:#9ca3af;}
  .submit{margin-top:14px;width:100%;height:52px;border:none;border-radius:14px;background:#4f46e5;color:#fff;font-size:16px;font-weight:800;cursor:pointer;}
  /* 가로 스코어보드 */
  .sb{display:flex;align-items:center;gap:6px;padding:6px 0 2px;}
  .sbteam{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .sbteam .chip{width:56px;height:56px;}
  .sbscore{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:0 2px 20px;}
  .sbnum{font-size:36px;font-weight:900;line-height:1;letter-spacing:-1px;color:#9ca3af;}
  .sbnum.win{color:#111827;}
  .sbcolon{font-size:22px;font-weight:800;color:#9ca3af;}
</style>
</head>
<body>
  <div class="frame">
    <div class="cap">지난 경기 상세 — 결과 입력 (팀장)</div>
    <div class="card">
      <div class="ttl">최종 스코어 <span class="sub">직접 입력</span></div>
      <div class="row">
        <div class="col">
          <div class="lw"><div class="chip"><img src="../src/assets/teams/logo_cheongcho_tigers.png"></div></div>
          <div class="name">청초 타이거즈</div><div class="csub me">우리팀 · 랭킹 5위</div>
          <input class="input" value="3" inputmode="numeric">
        </div>
        <div class="colon">:</div>
        <div class="col">
          <div class="lw"><div class="chip"><img src="../src/assets/teams/logo_shinchon_sharks.png"></div></div>
          <div class="name">신촌 샤크스</div><div class="csub">랭킹 2위</div>
          <input class="input" value="1" inputmode="numeric">
        </div>
      </div>
      <button class="submit">결과 제출</button>
    </div>

    <div class="cap">지난 경기 상세 — 완료 (승리 · 가로 스코어보드 · 이긴 쪽만 진하게)</div>
    <div class="card">
      <div class="ttl">경기 결과</div>
      <div class="banner win">
        <img class="b3d" src="../src/assets/images/emoji3d/trophy.png">
        <div class="btxt">승리!</div>
      </div>
      <div class="sb">
        <div class="sbteam">
          <div class="chip"><img src="../src/assets/teams/logo_cheongcho_tigers.png"></div>
          <div class="name">청초 타이거즈</div><div class="csub me">우리팀 · 5위</div>
        </div>
        <div class="sbscore">
          <div class="sbnum win">3</div><div class="sbcolon">:</div><div class="sbnum">1</div>
        </div>
        <div class="sbteam">
          <div class="chip"><img src="../src/assets/teams/logo_shinchon_sharks.png"></div>
          <div class="name">신촌 샤크스</div><div class="csub">2위</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
