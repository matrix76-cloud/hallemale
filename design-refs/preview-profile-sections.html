<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>팀/선수 상세 섹션 3D 아이콘</title>
<style>
  body{margin:0;background:#f9fafb;font-family:-apple-system,'Segoe UI',Roboto,'Malgun Gothic',sans-serif;padding:20px;display:flex;gap:20px;flex-wrap:wrap;}
  .col{width:340px;}
  .cap{font-size:13px;font-weight:700;color:#6b7280;margin:0 2px 10px;}
  .card{background:#fff;border-radius:16px;box-shadow:0 6px 16px rgba(15,23,42,.08);padding:6px 14px;}
  .row{display:flex;align-items:center;gap:8px;padding:14px 0;border-bottom:1px solid #f1f5f9;}
  .row:last-child{border-bottom:none;}
  .ic{width:30px;height:30px;display:flex;align-items:center;justify-content:center;}
  .ic img{width:27px;height:27px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(15,23,42,.16));}
  .t{font-size:16px;font-weight:700;color:#111827;}
</style>
</head>
<body>
  <div class="col">
    <div class="cap">팀 프로필 상세 — 섹션 3D 아이콘</div>
    <div class="card">
      <div class="row"><div class="ic"><img src="../src/assets/images/emoji3d/speech.png"></div><span class="t">팀 소개</span></div>
      <div class="row"><div class="ic"><img src="../src/assets/images/emoji3d/barchart.png"></div><span class="t">팀 전적</span></div>
      <div class="row"><div class="ic"><img src="../src/assets/images/emoji3d/flag.png"></div><span class="t">경기 기록</span></div>
      <div class="row"><div class="ic"><img src="../src/assets/images/emoji3d/people.png"></div><span class="t">팀 멤버</span></div>
      <div class="row"><div class="ic"><img src="../src/assets/images/emoji3d/picture.png"></div><span class="t">팀 사진/영상</span></div>
      <div class="row"><div class="ic"><img src="../src/assets/images/emoji3d/star.png"></div><span class="t">팀 리뷰</span></div>
    </div>
  </div>

  <div class="col">
    <div class="cap">선수 프로필 상세 — 섹션 3D 아이콘</div>
    <div class="card">
      <div class="row"><div class="ic"><img src="../src/assets/images/emoji3d/idcard.png"></div><span class="t">선수 프로필</span></div>
      <div class="row"><div class="ic"><img src="../src/assets/images/emoji3d/shield.png"></div><span class="t">소속 팀</span></div>
      <div class="row"><div class="ic"><img src="../src/assets/images/emoji3d/barchart.png"></div><span class="t">전적</span></div>
      <div class="row"><div class="ic"><img src="../src/assets/images/emoji3d/flag.png"></div><span class="t">경기 기록</span></div>
      <div class="row"><div class="ic"><img src="../src/assets/images/emoji3d/picture.png"></div><span class="t">경기 사진 / 영상</span></div>
    </div>
  </div>
</body>
</html>
