<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없어요 — 할래말래</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#6a3df0">
<link rel="icon" type="image/png" href="assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,sans-serif;color:#16181d;background:#fbfbfb;
  -webkit-font-smoothing:antialiased;letter-spacing:-0.4px;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.code{font-family:'Archivo',sans-serif;font-weight:900;font-size:96px;line-height:1;color:#6a3df0;letter-spacing:-2px}

.home{display:inline-flex;align-items:center;gap:8px;padding:14px 24px;background:#16181d;color:#fff;
  text-decoration:none;border-radius:13px;font-weight:700;font-size:15px;transition:transform .15s,background .15s}
.home:hover{background:#000;transform:translateY(-2px)}
.home:focus-visible{outline:3px solid #6a3df0;outline-offset:3px}
</style>
</head>
<body>
  <div class="code">404</div>
  <h1>이 페이지는 경기에 못 나왔어요</h1>
